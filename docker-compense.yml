# ============================================================
# FlowBoard — Docker Compose (Development)
# Run: docker-compose up --build
# ============================================================

version: "3.9"

# Named network: all services communicate by service name
# e.g., backend connects to 'db:5432' not 'localhost:5432'
networks:
  flowboard_network:
    driver: bridge

# Named volume: PostgreSQL data persists across container restarts
volumes:
  postgres_data:
  redis_data:

services:

  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine          # Alpine = smaller image (~50MB vs ~200MB)
    container_name: flowboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist data
    ports:
      - "5432:5432"                    # Expose for local DB clients (TablePlus, etc.)
    networks:
      - flowboard_network
    healthcheck:                       # Backend waits for DB to be truly ready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis (Pub/Sub for WebSockets + Caching)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowboard_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flowboard_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowboard_backend
    restart: unless-stopped
    env_file:
      - .env                           # Load all env vars from .env file
    volumes:
      - ./backend:/app                 # Hot-reload: code changes reflect instantly
    ports:
      - "8000:8000"
    networks:
      - flowboard_network
    depends_on:
      db:
        condition: service_healthy     # Wait for DB health check, not just container start
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ──────────────────────────────────────────
  # React Frontend (Vite Dev Server)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev       # Separate dev Dockerfile
    container_name: flowboard_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules              # Anonymous volume: prevent host overwriting
    ports:
      - "5173:5173"
    networks:
      - flowboard_network
    depends_on:
      - backend

  # ──────────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: flowboard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - flowboard_network
    depends_on:
      - backend
      - frontend